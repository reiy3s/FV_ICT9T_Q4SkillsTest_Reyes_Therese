<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login</title>
</head>

    <style>

        #form-div{
            background-color: rgba(155, 172, 199, 0.7);
            width: 400px;
            margin-top: 9%;
            border-radius: 5%;
        }

        .ontoggle{
            margin-bottom: 15px;
        }

    </style>

<body>

    <div class="container text-center" id="form-div">
        <br><br>

        <h1>Login</h1>
        <p>Welcome back to rrrxnt!!</p>

        <details class="ontoggle">
            <summary><i>Instructions</i></summary>
            <p id="instructions">Enter your stuff to log back in!</p>
        </details>

        <form>

            <div>
                <label for="user"><b>Username:</b></label>
                <input type="text" name="user" id="user" placeholder="Enter your super secret name here..." class="form-control">
            </div>

            <br>

            <div>
                <label for="pw"><b>Password:</b></label>
                <input type="password" name="pw" id="pw" placeholder="Enter your shhhh here..." class="form-control">
            </div>

            <br>

            <div>
                <label for="checkbox">Remember me?</label>
                <input type="checkbox" name="checkbox-rmbr" id="rmbr" class="" onclick="checkbox()">
            </div>

            <i><div id="display"></div></i><br>

            <button type="button" class="btn btn-info" onclick="GETIN()">Login</button>

        <br><br></form>
    </div>

    <script>
        function GETIN(){
            let user = document.getElementById("user").value;
            let password = document.getElementById("pw").value;
                if (user=="mikmikk" && password=="yawnn"){
                    alert("Welcome back, mikmikk!" );
                    window.location.href = "notebooks.html"
                }

                else{
                    alert("Wrong username or password. Nice try getting in, buddy!");
                }
        }


        function checkbox() {
        let remember = document.getElementById("rmbr").checked; 
        let display = document.getElementById("display");

        switch(remember) {
            case true:
                display.innerHTML = "Gotcha, we'll try not to forget!"
            break;

            case false:
                display.innerHTML = "Yow! We won't remember this login :(("
            break;
            }
        }

    </script>
    
</body>
</html>
